{% set name = "meson" %}
{% set version = "0.64.1" %}
{% set sha256 = "3a8e030c2334f782085f81627062cc6d4a6771edf31e055ffe374f9e6b089ab9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  skip: True # [py<37]
  script: {{ PYTHON }} -m pip install . -vv --no-deps
  entry_points:
    - meson = mesonbuild.mesonmain:main

requirements:
  host:
    - python
    - setuptools >=42
    - pip
    - wheel
  run:
    - python
    - ninja >=1.8.2

test:
  requires:
    - pip
  commands:
    - pip check
    - meson -h
    - meson -v
    - meson --internal delsuffix . nomatchqqq  # test reexecution (GitHub issue #11)

about:
  home: https://mesonbuild.com
  license: Apache-2.0
  license_family: Apache
  license_file: COPYING
  summary: The Meson Build System
  description: |
    Meson is an open source build system meant to be both extremely fast, and, even more importantly, as user friendly as possible.

    The main design point of Meson is that every moment a developer spends writing or debugging build definitions is a second wasted.
    So is every second spent waiting for the build system to actually start compiling code.
  doc_url: https://mesonbuild.com
  dev_url: https://github.com/mesonbuild/meson

extra:
  recipe-maintainers:
    - dirmeier
    - pkgw
    - SoapZA
    - wolfv
    - tschoonj
